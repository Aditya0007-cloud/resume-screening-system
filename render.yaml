services:
  - type: web
    name: ai-resume-ats-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: AI Resume Screening & ATS Analyzer
      - key: DATABASE_URL
        value: sqlite:///./data/resume_screening.db
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
